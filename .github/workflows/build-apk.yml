name: بناء APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # تحميل المكتبات الخارجية محلياً حتى يعمل التطبيق بدون إنترنت
      - name: Download libraries for offline use
        run: |
          mkdir -p public/libs
          
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" \
            -o public/libs/xlsx.full.min.js
          
          curl -sL "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" \
            -o public/libs/qrcode.min.js
          
          curl -sL "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" \
            -o public/libs/html5-qrcode.min.js
          
          echo "Library sizes:"
          ls -lh public/libs/

      # توليد CSS من Tailwind بدون CDN
      - name: Generate Tailwind CSS offline
        run: |
          npm install tailwindcss @tailwindcss/cli --no-package-lock 2>/dev/null || \
          npm install tailwindcss --no-package-lock

          # إنشاء ملف إدخال Tailwind
          cat > tailwind-input.css << 'TWEOF'
          @tailwind base;
          @tailwind components;
          @tailwind utilities;
          TWEOF

          # توليد CSS بناءً على الكلاسات المستخدمة في index.html
          npx tailwindcss \
            --input tailwind-input.css \
            --output public/libs/tailwind.min.css \
            --content "public/index.html" \
            --minify || \
          # Fallback: تحميل نسخة كاملة
          curl -sL "https://cdn.tailwindcss.com/3.4.0/tailwind.min.css" \
            -o public/libs/tailwind.min.css || \
          curl -sL "https://unpkg.com/tailwindcss@3/dist/tailwind.min.css" \
            -o public/libs/tailwind.min.css
          
          ls -lh public/libs/tailwind.min.css || echo "Tailwind fallback needed"

      # تحديث index.html ليستخدم المكتبات المحلية بدل CDN
      - name: Update index.html to use local libraries
        run: |
          # استبدال روابط CDN بروابط محلية
          sed -i 's|https://cdn.tailwindcss.com|libs/tailwind.min.css|g' public/index.html
          sed -i 's|<script src="https://cdn.tailwindcss.com"></script>|<link rel="stylesheet" href="libs/tailwind.min.css" />|g' public/index.html
          sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js|libs/xlsx.full.min.js|g' public/index.html
          sed -i 's|https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js|libs/qrcode.min.js|g' public/index.html
          sed -i 's|https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js|libs/html5-qrcode.min.js|g' public/index.html
          
          echo "=== Checking CDN references remaining ==="
          grep -n "cdn\|unpkg\|cdnjs" public/index.html || echo "✅ No CDN references remaining"
          
          echo "=== Local lib references ==="
          grep -n "libs/" public/index.html

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli --no-package-lock

      - name: Add Android platform
        run: npx cap add android

      - name: Set minSdkVersion to 22
        run: |
          if [ -f android/variables.gradle ]; then
            sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 22/' android/variables.gradle
          fi

      - name: Copy AndroidManifest permissions
        run: cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Show APK size
        run: ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: delivery-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: echo "✅ APK جاهز — offline كامل بدون CDN"
